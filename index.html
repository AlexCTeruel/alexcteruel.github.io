<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:'Inter',sans-serif;
  background:#ffffff;
  color:#111111;
  line-height:1.6;
}

.hero{
  padding:80px 20px;
  background:#ffffff;
  border-bottom:1px solid #e6e6e6;
}

.hero-inner{
  max-width:1200px;
  margin:auto;
}

.hero h1{
  font-family:'Playfair Display',serif;
  font-size:3rem;
  margin-bottom:10px;
  color:#111111;
}

.hero p{
  color:#666666;
  font-size:1rem;
}

main{
  max-width:1200px;
  margin:auto;
  padding:50px 20px;
}

.layout{
  display:grid;
  grid-template-columns:3fr 1fr;
  gap:50px;
}

.section-title{
  font-family:'Playfair Display',serif;
  font-size:1.6rem;
  margin-bottom:20px;
  border-left:4px solid #c81d25;
  padding-left:12px;
  color:#111111;
}

.tabs{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  margin-bottom:28px;
}

.tab-button{
  background:#f5f5f5;
  color:#333333;
  border:1px solid #dddddd;
  padding:10px 16px;
  border-radius:999px;
  cursor:pointer;
  font-size:.92rem;
  transition:.25s ease;
}

.tab-button:hover{
  background:#fff1f1;
  border-color:#c81d25;
  color:#c81d25;
  transform:translateY(-1px);
}

.tab-button.active{
  background:#c81d25;
  color:#ffffff;
  border-color:#c81d25;
}

#reports-container{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:25px;
}

.report{
  background:#ffffff;
  border-radius:10px;
  overflow:hidden;
  transition:all .25s ease;
  border:1px solid #e5e5e5;
}

.report:hover{
  transform:translateY(-6px);
  box-shadow:0 10px 25px rgba(0,0,0,0.08);
  border:1px solid #c81d25;
}

.report img{
  width:100%;
  height:180px;
  object-fit:cover;
  background:#f2f2f2;
}

.vehicle{
  font-size:.75rem;
  letter-spacing:.5px;
  text-transform:uppercase;
  color:#8a8a8a;
  padding:14px 16px 0 16px;
}

.category{
  font-size:.72rem;
  color:#c81d25;
  text-transform:uppercase;
  letter-spacing:.6px;
  padding:4px 16px 0 16px;
  font-weight:600;
}

.report h3{
  font-family:'Playfair Display',serif;
  font-size:1.05rem;
  padding:8px 16px 20px 16px;
  line-height:1.4;
  transition:.3s;
}

.report a:hover h3{
  background:linear-gradient(90deg,#9e0b0f,#c81d25,#ef233c,#9e0b0f);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.report a{
  text-decoration:none;
  color:#111111;
  display:block;
}

.bio{
  background:#fafafa;
  padding:25px;
  border-radius:10px;
  border:1px solid #e5e5e5;
  position:sticky;
  top:40px;
}

.bio h2{
  font-family:'Playfair Display',serif;
  margin-bottom:15px;
  color:#111111;
}

.bio p{
  font-size:.95rem;
  color:#555555;
  margin-bottom:20px;
}

.bio-icons{
  display:flex;
  gap:15px;
}

.bio-icons a{
  color:#c81d25;
  font-size:1.3rem;
  transition:.25s;
}

.bio-icons a:hover{
  color:#9e0b0f;
  transform:scale(1.15);
}

.empty-state{
  grid-column:1 / -1;
  background:#fafafa;
  border:1px solid #e5e5e5;
  border-radius:10px;
  padding:30px;
  color:#777777;
  text-align:center;
}

footer{
  border-top:1px solid #e5e5e5;
  padding:35px;
  margin-top:70px;
  text-align:center;
  color:#777777;
  font-size:.9rem;
}

@media(max-width:900px){
  .layout{
    grid-template-columns:1fr;
  }

  #reports-container{
    grid-template-columns:repeat(2,1fr);
  }

  .bio{
    position:static;
  }
}

@media(max-width:600px){
  #reports-container{
    grid-template-columns:1fr;
  }

  .hero h1{
    font-size:2.2rem;
  }
}
</style>
</head>

const categories = ["Todos", ...new Set(reports.map(report => report.category))];
let activeCategory = "Todos";

function renderTabs() {
  const tabsContainer = document.getElementById("tabs-container");
  tabsContainer.innerHTML = "";

  categories.forEach(category => {
    const button = document.createElement("button");
    button.classList.add("tab-button");

    if (category === activeCategory) {
      button.classList.add("active");
    }

    button.textContent = category;

    button.addEventListener("click", () => {
      activeCategory = category;
      renderTabs();
      renderReports();
    });

    tabsContainer.appendChild(button);
  });
}

function renderReports() {
  const container = document.getElementById("reports-container");
  container.innerHTML = "";

  const filteredReports = activeCategory === "Todos"
    ? reports
    : reports.filter(report => report.category === activeCategory);

  if (filteredReports.length === 0) {
    container.innerHTML = `
      <div class="empty-state">
        Nenhuma reportagem encontrada nesta categoria.
      </div>
    `;
    return;
  }

  filteredReports.forEach(report => {
    const div = document.createElement("div");
    div.classList.add("report");

    div.innerHTML = `
      <a href="${report.link}" target="_blank">
        <img src="${report.image}" alt="${report.title}">
        <div class="vehicle">${report.vehicle}</div>
        <div class="category">${report.category}</div>
        <h3>${report.title}</h3>
      </a>
    `;

    container.appendChild(div);
  });
}

renderTabs();
renderReports();
</script>
