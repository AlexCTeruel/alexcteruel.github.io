<!DOCTYPE html>
<html lang="pt-BR">

<meta charset="UTF-8">

<title>Bruna Correia | Jornalista</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Inter',sans-serif;
background:#0f0f0f;
color:white;
line-height:1.6;
}

/* HERO */

.hero{
padding:80px 20px;
background:linear-gradient(120deg,#1c1c1c,#0f0f0f);
border-bottom:1px solid #2a2a2a;
}

.hero-inner{
max-width:1200px;
margin:auto;
}

.hero h1{
font-family:'Playfair Display',serif;
font-size:3rem;
margin-bottom:10px;
}

.hero p{
color:#aaa;
font-size:1rem;
}

/* MAIN */

main{
max-width:1200px;
margin:auto;
padding:50px 20px;
}

/* GRID */

.layout{
display:grid;
grid-template-columns:3fr 1fr;
gap:50px;
}

/* SECTION TITLE */

.section-title{
font-family:'Playfair Display',serif;
font-size:1.6rem;
margin-bottom:25px;
border-left:4px solid #888;
padding-left:12px;
}

/* REPORT GRID */

#reports-container{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:25px;
}

/* CARD */

.report{
background:linear-gradient(180deg,#1c1c1c,#151515);
border-radius:10px;
overflow:hidden;
transition:all .25s ease;
border:1px solid #252525;
}

.report:hover{
transform:translateY(-6px);
box-shadow:0 12px 30px rgba(0,0,0,0.5);
border:1px solid #6c4cff;
}

.report img{
width:100%;
height:180px;
object-fit:cover;
}

.vehicle{
font-size:.75rem;
letter-spacing:.5px;
text-transform:uppercase;
color:#9e9e9e;
padding:14px 16px 0 16px;
}

.report h3{
font-family:'Playfair Display',serif;
font-size:1.05rem;
padding:8px 16px 20px 16px;
line-height:1.4;
transition:.3s;
}

/* HOVER COLORIDO */

.report a:hover h3{

background:linear-gradient(90deg,#c084fc,#a78bfa,#7dd3fc,#c084fc);

-webkit-background-clip:text;
-webkit-text-fill-color:transparent;

}

.report a{
text-decoration:none;
color:white;
display:block;
}

/* SIDEBAR */

.bio{
background:#151515;
padding:25px;
border-radius:10px;
border:1px solid #252525;
position:sticky;
top:40px;
}

.bio h2{
font-family:'Playfair Display',serif;
margin-bottom:15px;
}

.bio p{
font-size:.95rem;
color:#ccc;
margin-bottom:20px;
}

.bio-icons{
display:flex;
gap:15px;
}

.bio-icons a{
color:#c4b5fd;
font-size:1.3rem;
transition:.25s;
}

.bio-icons a:hover{
color:#e9d5ff;
transform:scale(1.15);
}

/* FOOTER */

footer{
border-top:1px solid #222;
padding:35px;
margin-top:70px;
text-align:center;
color:#777;
font-size:.9rem;
}

/* RESPONSIVO */

@media(max-width:900px){

.layout{
grid-template-columns:1fr;
}

#reports-container{
grid-template-columns:repeat(2,1fr);
}

}

@media(max-width:600px){

#reports-container{
grid-template-columns:1fr;
}

.hero h1{
font-size:2.2rem;
}

}

</style>

</head>

<body>

<div class="hero-inner">
